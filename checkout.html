<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hooperz — Checkout</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <span class="logo-ball">🏀</span>
        <span class="logo-name">hooper<span class="accent">z</span></span>
      </div>
      <nav class="nav">
        <a href="index.html">← Torna al negozio</a>
      </nav>
    </div>
  </header>

  <!-- CHECKOUT -->
  <section class="checkout-section">
    <div class="container">
      <div class="checkout-layout">

        <!-- RIEPILOGO ORDINE -->
        <div class="order-summary">
          <h2 class="checkout-title">Riepilogo ordine</h2>
          <div id="orderItems"></div>

          <p id="freeshippingBanner" class="freeshipping-banner"></p>

          <h2 class="checkout-title" style="margin-top:1.5rem">Spedizione</h2>
          <div class="shipping-options">
            <select id="shippingOptions" class="shipping-select">
              <option value="standard">Standard (5-7 giorni) — €5.90</option>
              <option value="express">Express (1-2 giorni) — €12.90</option>
            </select>
          </div>

          <div class="order-totals">
            <div class="order-row">
              <span>Subtotale</span>
              <span id="subtotal">€0</span>
            </div>
            <div class="order-row">
              <span>Spedizione</span>
              <span id="shippingCost">€5.90</span>
            </div>
            <div class="order-row order-total">
              <span>Totale</span>
              <span id="total">€0</span>
            </div>
          </div>
        </div>

        <!-- FORM PAGAMENTO -->
        <div class="payment-form">
          <h2 class="checkout-title">Dati di consegna</h2>

          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="fullName" placeholder="Mario Rossi">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="mario@email.com">
          </div>
          <div class="form-group">
            <label>Indirizzo</label>
            <input type="text" id="address" placeholder="Via Roma 1">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Città</label>
              <input type="text" id="city" placeholder="Milano">
            </div>
            <div class="form-group">
              <label>CAP</label>
              <input type="text" id="zip" placeholder="20100">
            </div>
          </div>

          <h2 class="checkout-title" style="margin-top:2rem">Pagamento</h2>
          <div class="form-group">
            <label>Dati carta</label>
            <div id="card-element"></div>
            <div id="card-errors" class="card-errors"></div>
          </div>

          <button class="btn-primary btn-large" id="payBtn">
            Paga ora
          </button>

          <p class="secure-note">🔒 Pagamento sicuro con Stripe</p>
        </div>

      </div>
    </div>
  </section>

  <script src="js/products.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
